<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FIFA 2026 Final</title>
    <style>
        body { margin: 0; font-family: 'Arial', sans-serif; text-align: center; overflow-x: hidden; }
        
        /* Page 1: Sky Blue and Red */
        #page-1 { background: linear-gradient(135deg, #87CEEB, #FF4500); padding: 40px 20px; min-height: 100vh; color: black; font-weight: 900; }
        .hero-img { width: 300px; border: 8px solid white; border-radius: 15px; margin: 10px; }

        /* Page 2: Vibrant Navy Blue */
        #page-2 { display: none; background: #000080; min-height: 100vh; padding: 20px; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding-top: 20px; }
        
        /* Premium Parrot Green Tickets */
        .card { 
            width: 160px; height: 220px; background: #7CFC00; border: 8px solid gold; 
            border-radius: 20px; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; position: relative; opacity: 0; transition: opacity 1s;
        }
        .watermark { position: absolute; top: 10px; font-size: 0.8rem; font-weight: 900; color: black; }
        .dilute { opacity: 0.1 !important; transition: opacity 2s; }
        
        /* Flip Reveal */
        .stage { perspective: 1000px; width: 350px; margin: 50px auto; position: fixed; top: 20%; left: 50%; transform: translateX(-50%); }
        .inner { transition: transform 3s; transform-style: preserve-3d; cursor: pointer; }
        .flipped { transform: rotateY(180deg); }
        .front, .back { backface-visibility: hidden; position: absolute; width: 100%; background: white; padding: 20px; border-radius: 20px; border: 5px solid gold; box-sizing: border-box; }
        .back { transform: rotateY(180deg); }
        
        /* Effects */
        .flower { position: fixed; top: -50px; animation: fall 5s linear infinite; color: white; }
        @keyframes fall { to { transform: translateY(100vh); } }
    </style>
</head>
<body>
    <audio id="bg-music" src="music.mp3" loop autoplay></audio>
    
    <div id="page-1">
        <h1>WELCOME TO CHIRU'S WORLD OF GAME</h1>
        <h3>BUY TICKET FOR Rs 100 AND GET EXCITING PRIZE</h3>
        <p>1st prize- Rs 1200, 2nd Prize- 600 and 3rd prize- 200</p>
        <h2>FINAL OF FIFA WORLD CUP 2026</h2>
        <img src="WhatsApp-Image-2022-12-18-at-19.01.39.jpeg" class="hero-img">
        <h2 style="margin:0;">VS</h2>
        <img src="images.jpeg" class="hero-img">
        <br><button onclick="startApp()" style="padding:20px 40px; font-size:24px; cursor:pointer;">ENTER</button>
    </div>

    <div id="page-2">
        <input id="code" placeholder="Secret Code">
        <input id="num" placeholder="Ticket Number">
        <button onclick="performReveal()">REVEAL</button>
        <div class="grid" id="grid"></div>
        <div id="stage" class="stage"></div>
    </div>

    <script>

            { id: 2, owners: "ADITYA and NITU / NEHA", arg: {name: "Lionel MESSI", photo: "images/argentina/lionel_messi.jpg"}, esp: {name: "Marc CUCURELLA", photo: "images/spain/marc_cucurella.jpg"} },
            { id: 3, owners: "SISHIR and ANUSH / SAJIT", arg: {name: "Enzo FERNANDEZ", photo: "images/argentina/enzo_fernandez.jpg"}, esp: {name: "Pau CUBARSI", photo: "images/spain/pau_cubarsi.jpg"} },
            { id: 4, owners: "KARAN and NITU / ASHWIN", arg: {name: "Facundo MEDINA", photo: "images/argentina/facundo_medina.jpg"}, esp: {name: "Martin ZUBIMENDI", photo: "images/spain/martin_zubimendi.jpg"} },

            { id: 7, owners: "ANUSH and AYUSH / KRISHNA", arg: {name: "Nico GONZALEZ", photo: "images/argentina/nico_gonzalez.jpg"}, esp: {name: "Pedro PORRO", photo: "images/spain/pedro_porro.jpg"} },

            { id: 9, owners: "ADITYA and REHANT / REGAN", arg: {name: "Exequiel PALACIOS", photo: "images/argentina/exequiel_palacios.jpg"}, esp: {name: "Marcos LLORENTE", photo: "images/spain/marcos_llorente.jpg"} },

            { id: 11, owners: "SATISH and REGAN / NEHA", arg: {name: "Giovani LO CELSO", photo: "images/argentina/giovani_lo_celso.jpg"}, esp: {name: "Marc PUBILL", photo: "images/spain/marc_pubill.jpg"} },
            { id: 12, owners: "PUJA and SISHIR / NEHA", arg: {name: "Nicolas TAGLIAFICO", photo: "images/argentina/nicolas_tagliafico.jpg"}, esp: {name: "Fabian RUIZ", photo: "images/spain/fabian_ruiz.jpg"} },
            { id: 13, owners: "PRANILA and DIWAKAR / PRANIKA", arg: {name: "Lautaro MARTINEZ", photo: "images/argentina/lautaro_martinez.jpg"}, esp: {name: "Alex GRIMALDO", photo: "images/spain/alex_grimaldo.jpg"} },
            { id: 14, owners: "ISHA and SRISTY / KARAN", arg: {name: "Marcos SENESI", photo: "images/argentina/marcos_senesi.jpg"}, esp: {name: "Mikel OYARZABAL", photo: "images/spain/mikel_oyarzabal.jpg"} },
            { id: 15, owners: "PRAKASH and PUJA / SAJIT", arg: {name: "Julian ALVAREZ", photo: "images/argentina/julian_alvarez.jpg"}, esp: {name: "Eric GARCIA", photo: "images/spain/eric_garcia.jpg"} },

            { id: 20, owners: "RAHIM and AYUSH / MANTAY", arg: {name: "Rodrigo DE PAUL", photo: "images/argentina/rodrigo_de_paul.jpg"}, esp: {name: "Lamine YAMAL", photo: "images/spain/lamine_yamal.jpg"} },
            { id: 21, owners: "ADITYA and SURENDRA / NEHA", arg: {name: "Giuliano SIMEONE", photo: "images/argentina/giuliano_simeone.jpg"}, esp: {name: "Nico WILLIAMS", photo: "images/spain/nico_williams.jpg"} },
            { id: 22, owners: "SURENDRA and SUJAN / PRANIKA", arg: {name: "Leandro PAREDES", photo: "images/argentina/leandro_paredes.jpg"}, esp: {name: "Yeremy PINO", photo: "images/spain/yeremy_pino.jpg"} },
            { id: 23, owners: "SURENDRA and NIRAJ / NEHA", arg: {name: "Thiago ALMADA", photo: "images/argentina/thiayo_almada.jpg"}, esp: {name: "Dani OLMO", photo: "images/spain/dani_olmo.jpg"} }
        ];
        
        function startApp() {
            document.getElementById('page-1').style.display = 'none';
            document.getElementById('page-2').style.display = 'block';
            document.getElementById('bg-music').play();
            
            // Flower effect
            for(let i=0; i<15; i++) {
                let f = document.createElement('div'); f.innerHTML = "✿"; f.className = "flower";
                f.style.left = Math.random()*100 + "vw"; f.style.animationDelay = Math.random()*5 + "s";
                document.body.appendChild(f);
            }
            
            const grid = document.getElementById('grid');
            ticketsData.forEach(t => {
                grid.innerHTML += `
                    <div class="card" id="card-${t.id}">
                        <div class="watermark">CREATOR- CHIRU</div>
                        <div style="font-size:2rem">🔒</div>
                        Ticket ${t.id}<br><b>${t.owners}</b>
                    </div>`;
            });
            
            ticketsData.forEach((t, i) => {
                setTimeout(() => { document.getElementById(`card-${t.id}`).style.opacity = "1"; }, i * 3000);
            });
        }

        function performReveal() {
            if(document.getElementById('code').value !== "GOAT VS TIKI TAKA") return alert("Wrong Code!");
            const num = document.getElementById('num').value;
            const target = ticketsData.find(x => x.id == num);
            if(!target) return alert("Ticket not found!");
            
            document.querySelectorAll('.card').forEach(c => c.classList.add('dilute'));
            
            const stage = document.getElementById('stage');
            stage.innerHTML = `
                <div class="inner" onclick="this.classList.add('flipped')">
                    <div class="front"><h3>Ticket ${target.id}</h3><p>${target.owners}</p></div>
                    <div class="back">
                        <img src="${target.arg.photo}" width="80"> ${target.arg.name}<br>
                        <img src="${target.esp.photo}" width="80"> ${target.esp.name}
                    </div>
                </div>`;
        }
    </script>
</body>
</html>
