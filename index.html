<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FIFA 2026 Final</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; text-align: center; background: #000080; color: white; overflow-x: hidden; }
        
        #page-1 { background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d); padding: 50px 20px; min-height: 100vh; }
        .hero-container { display: flex; justify-content: center; gap: 30px; margin: 30px 0; }
        .hero-img { width: 300px; border: 8px solid white; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        
        #page-2 { display: none; min-height: 100vh; padding: 40px 20px; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 40px; padding: 20px; }
        
        .card-container { width: 180px; height: 250px; perspective: 1200px; opacity: 0; transition: all 1s ease; }
        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .flipped { transform: rotateY(180deg); }
        
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; border: 4px solid #FFD700; background: linear-gradient(to bottom, #333, #000); display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 8px 15px rgba(0,0,0,0.3); }
        .back { background: #fff; color: #000; transform: rotateY(180deg); padding: 10px; box-sizing: border-box; }
        
        .dilute { opacity: 0.1 !important; pointer-events: none; }
        .highlight { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(2) !important; z-index: 1000; }
        
        h1 { text-shadow: 2px 2px 4px #000; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; background: gold; border: none; border-radius: 10px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <audio id="bg-music" src="music.mp3" loop></audio>
    
    <div id="page-1">
        <h1>WELCOME TO CHIRU'S WORLD OF GAME</h1>
        <h3>BUY TICKET FOR Rs 100 AND GET EXCITING PRIZE</h3>
        <p>1st prize- Rs 1200, 2nd Prize- 600 and 3rd prize- 200</p>
        <h2>FINAL OF FIFA WORLD CUP 2026</h2>
        <div class="hero-container">
            <img src="WhatsApp-Image-2022-12-18-at-19.01.39.jpeg" class="hero-img">
            <img src="images.jpeg" class="hero-img">
        </div>
        <button onclick="startApp()">ENTER</button>
    </div>

    <div id="page-2">
        <input id="code" placeholder="Secret Code">
        <input id="num" placeholder="Ticket Number (or ALL)">
        <button onclick="performReveal()">REVEAL</button>
        <div class="grid" id="grid"></div>
    </div>

    <script>
        const ticketsData = [
            { id: 1, owners: "NIRAJ and KARAN / RESHMA", arg: {name: "Lautaro Martinez", num: 22, photo: "images/argentina/lautaro_martinez.jpg"}, esp: {name: "Pau Cubarsi", num: 22, photo: "images/spain/pau_cubarsi.jpg"} },
            { id: 2, owners: "ADITYA and NITU / NEHA", arg: {name: "Lionel MESSI", num: 10, photo: "images/argentina/lionel_messi.jpg"}, esp: {name: "Marc Cucurella", num: 24, photo: "images/spain/marc_cucurella.jpg"} },
            { id: 3, owners: "SISHIR and ANUSH / REHANT", arg: {name: "Julian Alvarez", num: 9, photo: "images/argentina/julian_alvarez.jpg"}, esp: {name: "Aymeric Laporte", num: 14, photo: "images/spain/aymeric_laporte.jpg"} },
            { id: 4, owners: "KARAN and NITU / ASHWIN", arg: {name: "Nico Paz", num: 18, photo: "images/argentina/nico_paz.jpg"}, esp: {name: "Pedro Porro", num: 12, photo: "images/spain/pedro_porro.jpg"} },
            { id: 5, owners: "ISHA and MAHESH / PRITY", arg: {name: "Thiago Almada", num: 16, photo: "images/argentina/thiayo_almada.jpg"}, esp: {name: "Eric Garcia", num: 4, photo: "images/spain/eric_garcia.jpg"} },
            { id: 6, owners: "PRIYANKA and ANJALI / NEHA", arg: {name: "Giuliano Simeone", num: 17, photo: "images/argentina/giuliano_simeone.jpg"}, esp: {name: "Marc Pubill", num: 2, photo: "images/spain/marc_pubill.jpg"} },
            { id: 7, owners: "ANUSH and AYUSH / KRISHNA", arg: {name: "Nahuel Molina", num: 26, photo: "images/argentina/nahuel_molina.jpg"}, esp: {name: "Ferran Torres", num: 7, photo: "images/spain/ferran_torres.jpg"} },
            { id: 8, owners: "MANISHA and BICKEL / ASHWIN", arg: {name: "Cristian Romero", num: 13, photo: "images/argentina/cristian_romero.jpg"}, esp: {name: "Mikel Oyarzabal", num: 21, photo: "images/spain/mikel_oyarzabal.jpg"} },
            { id: 9, owners: "ADITYA and NIRUPA / REGAN", arg: {name: "Lisandro Martinez", num: 6, photo: "images/argentina/lisandro_martinez.jpg"}, esp: {name: "Lamine Yamal", num: 19, photo: "images/spain/lamine_yamal.jpg"} },
            { id: 10, owners: "RAHIM and AYUSH / NEHA", arg: {name: "Nicolas Otamendi", num: 19, photo: "images/argentina/nicolas_otamendi.jpg"}, esp: {name: "Nico Williams", num: 17, photo: "images/spain/nico_williams.jpg"} },
            { id: 11, owners: "NIRUPA and REGAN / NEHA", arg: {name: "Facundo Medina", num: 25, photo: "images/argentina/facundo_medina.jpg"}, esp: {name: "Yeremy Pino", num: 11, photo: "images/spain/yeremy_pino.jpg"} },
            { id: 12, owners: "PUJA and SISHIR / PRANIKA", arg: {name: "Nicolas Tagliafico", num: 3, photo: "images/argentina/nicolas_tagliafico.jpg"}, esp: {name: "Dani Olmo", num: 10, photo: "images/spain/dani_olmo.jpg"} },
            { id: 13, owners: "PRANILA and DIWAKAR /KARAN", arg: {name: "Enzo Fernandez", num: 24, photo: "images/argentina/enzo_fernandez.jpg"}, esp: {name: "Pedri", num: 20, photo: "images/spain/pedri.jpg"} },
            { id: 14, owners: "ISHA and SRISTY / JITEN", arg: {name: "Alexis Mac Allister", num: 20, photo: "images/argentina/alexis_mac_allister.jpg"}, esp: {name: "Martin Zubimendi", num: 18, photo: "images/spain/martin_zubimendi.jpg"} },
            { id: 15, owners: "PRAKASH and PUJA / JITEN", arg: {name: "Nico Gonzalez", num: 15, photo: "images/argentina/nico_gonzalez.jpg"}, esp: {name: "Rodri", num: 16, photo: "images/spain/rodri.jpg"} },
            { id: 16, owners: "PRAKASH and SUJAN / RESHMA", arg: {name: "Exequiel Palacios", num: 14, photo: "images/argentina/exequiel_palacios.jpg"}, esp: {name: "Alex Baena", num: 15, photo: "images/spain/alex_baena.jpg"} },
            { id: 17, owners: "BICKEL and MAHESH / AMAN", arg: {name: "Giovani Lo Celso", num: 11, photo: "images/argentina/giovani_lo_celso.jpg"}, esp: {name: "Fabian Ruiz", num: 8, photo: "images/spain/fabian_ruiz.jpg"} },
            { id: 18, owners: "ADITYA and ANUJ / NEHA", arg: {name: "Marcos Senesi", num: 2, photo: "images/argentina/marcos_senesi.jpg"}, esp: {name: "Mikel Merino", num: 6, photo: "images/spain/mikel_merino.jpg"} },
            { id: 19, owners: "SUMER and ANJALI / KRISHNA", arg: {name: "Gonzalo Montiel", num: 4, photo: "images/argentina/gonzalo_montiel.jpg"}, esp: {name: "Alex Grimaldo", num: 3, photo: "images/spain/alex_grimaldo.jpg"} },
            { id: 20, owners: "RAHIM and AYUSH / MANTAY", arg: {name: "Jose Manuel Lopez", num: 21, photo: "images/argentina/jose_manuel_lopez.jpg"}, esp: {name: "Borja Iglesias", num: 26, photo: "images/spain/borja_iglesias.jpg"} },
            { id: 21, owners: "ADITYA and SURENDRA / NEHA", arg: {name: "Valentin Barco", num: 8, photo: "images/argentina/valentina_barco.jpg"}, esp: {name: "Victor Munoz", num: 25, photo: "images/spain/victor_munoz.jpg"} },
            { id: 22, owners: "SURENDRA and SUJAN / PRANIKA", arg: {name: "Leandro Paredes", num: 5, photo: "images/argentina/leandro_paredes.jpg"}, esp: {name: "Gavi", num: 9, photo: "images/spain/gavi.jpg"} },
            { id: 23, owners: "SURENDRA and NIRAJ / NEHA", arg: {name: "Rodrigo De Paul", num: 7, photo: "images/argentina/rodrigo_de_paul.jpg"}, esp: {name: "Dani Olmo", num: 10, photo: "images/spain/dani_olmo.jpg"} }
        ];

        function startApp() {
            document.getElementById('page-1').style.display = 'none';
            document.getElementById('page-2').style.display = 'block';
            document.getElementById('bg-music').play();
            const grid = document.getElementById('grid');
            ticketsData.forEach(t => {
                grid.innerHTML += `
                    <div class="card-container" id="container-${t.id}">
                        <div class="card" id="card-${t.id}">
                            <div class="front" id="front-${t.id}"><div style="font-size:2rem" id="lock-${t.id}">🔒</div><p>Ticket ${t.id}</p><b>${t.owners}</b></div>
                            <div class="back" id="back-${t.id}"></div>
                        </div>
                    </div>`;
            });
            ticketsData.forEach((t, i) => setTimeout(() => document.getElementById(`container-${t.id}`).style.opacity = "1", i * 3000));
        }

        function performReveal() {
            if(document.getElementById('code').value !== "GOAT VS TIKI TAKA") return alert("Wrong Code!");
            const input = document.getElementById('num').value.toUpperCase();
            
            if(input === "ALL") {
                ticketsData.forEach((t, i) => setTimeout(() => flipCard(t), i * 600));
            } else {
                const t = ticketsData.find(x => x.id == input);
                if(t) {
                    document.querySelectorAll('.card-container').forEach(c => { if(c.id !== `container-${t.id}`) c.classList.add('dilute'); });
                    document.getElementById(`container-${t.id}`).classList.add('highlight');
                    setTimeout(() => flipCard(t), 1000);
                } else alert("Ticket not found!");
            }
        }

        function flipCard(t) {
            document.getElementById(`lock-${t.id}`).innerHTML = "🔓";
            document.getElementById(`back-${t.id}`).innerHTML = `<h3>${t.arg.name}</h3><img src="${t.arg.photo}" width="50"><p>#${t.arg.num}</p><h3>${t.esp.name}</h3><img src="${t.esp.photo}" width="50"><p>#${t.esp.num}</p>`;
            document.getElementById(`card-${t.id}`).classList.add('flipped');
            const msg = new SpeechSynthesisUtterance(`Ticket ${t.id} revealed. Argentina player ${t.arg.name}, Spain player ${t.esp.name}.`);
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
