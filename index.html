<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FIFA 2026 Final</title>
    <style>
        body { margin: 0; font-family: 'Arial', sans-serif; text-align: center; overflow-x: hidden; background: #000080; }
        
        #page-1 { background: linear-gradient(135deg, #87CEEB, #FF4500); padding: 40px 20px; min-height: 100vh; color: black; font-weight: 900; }
        .hero-img { width: 300px; border: 8px solid white; border-radius: 15px; margin: 10px; display: block; margin-left: auto; margin-right: auto; }
        
        #page-2 { display: none; min-height: 100vh; padding: 20px; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding-top: 20px; transition: all 1s; }
        
        .card { 
            width: 160px; height: 220px; background: #7CFC00; border: 8px solid gold; 
            border-radius: 20px; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; position: relative; opacity: 0; transition: opacity 1s; padding: 10px; cursor: pointer;
        }
        .watermark { position: absolute; top: 10px; font-size: 0.8rem; font-weight: 900; color: black; }
        .dilute { opacity: 0.1 !important; transform: scale(0.8); transition: opacity 2s; }
        
        .stage { perspective: 1000px; width: 350px; margin: 50px auto; position: fixed; top: 15%; left: 50%; transform: translateX(-50%); z-index: 10; }
        .inner { transition: transform 3s; transform-style: preserve-3d; cursor: pointer; }
        .flipped { transform: rotateY(180deg); }
        .front, .back { backface-visibility: hidden; position: absolute; width: 100%; background: white; padding: 20px; border-radius: 20px; border: 5px solid gold; box-sizing: border-box; }
        .back { transform: rotateY(180deg); text-align: center; }
    </style>
</head>
<body>
    <audio id="bg-music" src="music.mp3" loop></audio>
    
    <div id="page-1">
        <h1>WELCOME TO CHIRU'S WORLD OF GAME</h1>
        <h3>BUY TICKET FOR Rs 100 AND GET EXCITING PRIZE</h3>
        <p>1st prize- Rs 1200, 2nd Prize- 600 and 3rd prize- 200</p>
        <h2>FINAL OF FIFA WORLD CUP 2026</h2>
        <img src="WhatsApp-Image-2022-12-18-at-19.01.39.jpeg" class="hero-img">
        <h2 style="margin:0;">VS</h2>
        <img src="images.jpeg" class="hero-img">
        <br><button onclick="startApp()" style="padding:20px 40px; font-size:24px; cursor:pointer;">ENTER</button>
    </div>

    <div id="page-2">
        <input id="code" placeholder="Secret Code">
        <input id="num" placeholder="Ticket Number">
        <button onclick="performReveal()">REVEAL</button>
        <div class="grid" id="grid"></div>
        <div id="stage" class="stage"></div>
    </div>

    <script>
        const ticketsData = [
            { id: 1, owners: "NIRAJ and KARAN / SAJIT", arg: {name: "Lautaro Martinez", num: 22, photo: "images/argentina/lautaro_martinez.jpg"}, esp: {name: "Pau Cubarsi", num: 22, photo: "images/spain/pau_cubarsi.jpg"} },
            { id: 2, owners: "ADITYA and NITU / NEHA", arg: {name: "Lionel MESSI", num: 10, photo: "images/argentina/lionel_messi.jpg"}, esp: {name: "Marc Cucurella", num: 24, photo: "images/spain/marc_cucurella.jpg"} },
            // ... [Populate remaining IDs 3-23 with your specific data]
        ];
        
        function startApp() {
            document.getElementById('page-1').style.display = 'none';
            document.getElementById('page-2').style.display = 'block';
            document.getElementById('bg-music').play();
            
            const grid = document.getElementById('grid');
            ticketsData.forEach(t => {
                grid.innerHTML += `<div class="card" id="card-${t.id}"><div class="watermark">CREATOR- CHIRU</div><div style="font-size:2rem">🔒</div>Ticket ${t.id}<br><b>${t.owners}</b></div>`;
            });
            ticketsData.forEach((t, i) => setTimeout(() => document.getElementById(`card-${t.id}`).style.opacity = "1", i * 3000));
        }

        function performReveal() {
            if(document.getElementById('code').value !== "GOAT VS TIKI TAKA") return alert("Wrong Code!");
            const num = document.getElementById('num').value;
            const t = ticketsData.find(x => x.id == num);
            if(!t) return alert("Ticket not found!");
            
            document.querySelectorAll('.card').forEach(c => c.classList.add('dilute'));
            
            const msg = new SpeechSynthesisUtterance(`Ticket ${t.id} owned by ${t.owners}. Argentina player ${t.arg.name} jersey number ${t.arg.num}. Spain player ${t.esp.name} jersey number ${t.esp.num}.`);
            window.speechSynthesis.speak(msg);
            
            document.getElementById('stage').innerHTML = `
                <div class="inner" onclick="this.classList.add('flipped')">
                    <div class="front"><h3>Ticket ${t.id}</h3><p>${t.owners}</p></div>
                    <div class="back">
                        <h3>Argentina</h3><img src="${t.arg.photo}" width="80"><p>${t.arg.name} #${t.arg.num}</p>
                        <h3>Spain</h3><img src="${t.esp.photo}" width="80"><p>${t.esp.name} #${t.esp.num}</p>
                    </div>
                </div>`;
        }
    </script>
</body>
</html>
