<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FIFA 2026 Final</title>
    <style>
        body { margin: 0; font-family: sans-serif; text-align: center; }
        
        /* PAGE 1 */
        #page-1 { background: linear-gradient(135deg, #87CEEB, #FF4500); padding: 40px; min-height: 100vh; }
        .hero-img { width: 300px; border: 5px solid white; border-radius: 15px; margin: 10px; display: block; margin-left: auto; margin-right: auto; }
        
        /* PAGE 2 */
        #page-2 { display: none; background: #000080; min-height: 100vh; padding: 20px; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .card { width: 160px; height: 220px; background: #7CFC00; border: 8px solid gold; border-radius: 15px; opacity: 0; transition: opacity 1s; padding: 10px; }
        .dilute { opacity: 0.1 !important; transition: opacity 2s; }
        
        /* Flip */
        .stage { perspective: 1000px; width: 350px; margin: 50px auto; }
        .inner { transition: transform 2s; transform-style: preserve-3d; }
        .flipped { transform: rotateY(180deg); }
        .front, .back { backface-visibility: hidden; position: absolute; width: 100%; background: white; padding: 20px; border-radius: 20px; box-sizing: border-box; border: 5px solid gold; }
        .back { transform: rotateY(180deg); }
    </style>
</head>
<body>
    <audio id="bg-music" src="music.mp3" loop autoplay></audio>
    
    <div id="page-1">
        <h1>WELCOME TO CHIRU'S WORLD OF GAME</h1>
        <h3>BUY TICKET FOR Rs 100 AND GET EXCITING PRIZE</h3>
        <p>1st prize- Rs 1200, 2nd Prize- 600 and 3rd prize- 200</p>
        <h2>FINAL OF FIFA WORLD CUP 2026</h2>
        <img src="WhatsApp-Image-2022-12-18-at-19.01.39.jpeg" class="hero-img">
        <h2>VS</h2>
        <img src="images.jpeg" class="hero-img">
        <br><button onclick="startApp()" style="padding:20px 40px; font-size:24px; cursor:pointer;">ENTER</button>
    </div>

    <div id="page-2">
        <input id="code" placeholder="Secret Code">
        <input id="num" placeholder="Ticket Number">
        <button onclick="reveal()">REVEAL</button>
        <div class="grid" id="grid"></div>
        <div id="stage" class="stage"></div>
    </div>

    <script>
        const ticketsData = [
            { id: 1, owners: "NIRAJ and KARAN / SAJIT", arg: {name: "Messi", photo: "images/arg/messi.jpg"}, esp: {name: "Gavi", photo: "images/esp/gavi.jpg"} },
            /* FILL REMAINING 2-23 HERE */
        ];
        
        function startApp() {
            document.getElementById('page-1').style.display = 'none';
            document.getElementById('page-2').style.display = 'block';
            document.getElementById('bg-music').play();
            const grid = document.getElementById('grid');
            ticketsData.forEach(t => grid.innerHTML += `<div class="card" id="card-${t.id}">CREATOR- CHIRU<br>🔒 Ticket ${t.id}<br><b>${t.owners}</b></div>`);
            ticketsData.forEach((t, i) => setTimeout(() => document.getElementById(`card-${t.id}`).style.opacity = "1", i * 3000));
        }

        function reveal() {
            if(document.getElementById('code').value !== "GOAT VS TIKI TAKA") return alert("Wrong Code!");
            const num = document.getElementById('num').value;
            document.querySelectorAll('.card').forEach(c => c.classList.add('dilute'));
            const t = ticketsData.find(x => x.id == num);
            if(t) {
                document.getElementById('stage').innerHTML = `
                    <div class="inner" onclick="this.classList.add('flipped')">
                        <div class="front"><h3>Ticket ${t.id}</h3><p>${t.owners}</p></div>
                        <div class="back">
                            <img src="${t.arg.photo}" width="100"> ${t.arg.name}<br>
                            <img src="${t.esp.photo}" width="100"> ${t.esp.name}
                        </div>
                    </div>`;
            }
        }
    </script>
</body>
</html>
