<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FIFA 2026 Final</title>
    <style>
        body { margin: 0; font-family: 'Arial', sans-serif; text-align: center; overflow-x: hidden; }
        
        /* Page 1: Vibrant Sky Blue and Red */
        #page-1 { background: linear-gradient(135deg, #87CEEB, #FF4500); padding: 50px 20px; min-height: 100vh; color: black; font-weight: 900; }
        .hero-img { width: 300px; border: 5px solid white; border-radius: 15px; margin: 10px; }

        /* Page 2: Luxury Navy Blue Background */
        #page-2 { display: none; background: #000080; min-height: 100vh; padding: 20px; }
        
        /* Premium Parrot Green Tickets */
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding-top: 20px; }
        .card { 
            width: 160px; height: 220px; background: #7CFC00; border: 6px solid gold; 
            border-radius: 15px; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; position: relative; opacity: 0; transition: opacity 1s;
        }
        .creator-label { font-weight: bold; font-size: 0.8rem; color: black; margin-bottom: 5px; }
        .locked-icon { font-size: 2rem; margin-bottom: 5px; }
        
        .revealed { background: white; color: black; padding: 30px; border-radius: 20px; margin: 20px auto; max-width: 600px; border: 5px solid gold; }
    </style>
</head>
<body>
    <audio id="bg-music" src="music.mp3" loop autoplay></audio>
    
    <div id="page-1">
        <h1>WELCOME TO CHIRU'S WORLD OF GAME</h1>
        <h3>BUY TICKET FOR Rs 100 AND GET EXCITING PRIZE</h3>
        <p>1st prize- Rs 1200, 2nd Prize- 600 and 3rd prize- 200</p>
        <h2>FINAL OF FIFA WORLD CUP 2026</h2>
        <img src="WhatsApp-Image-2022-12-18-at-19.01.39_2.jpeg" class="hero-img">
        <h2>VS</h2>
        <img src="images_2.jpeg" class="hero-img">
        <br><button onclick="startApp()" style="padding:20px 40px; font-size:24px; cursor:pointer;">ENTER</button>
    </div>

    <div id="page-2">
        <input id="code" placeholder="Secret Code">
        <input id="num" placeholder="Ticket Number or ALL">
        <button onclick="reveal()">REVEAL</button>
        <div class="grid" id="grid"></div>
        <div id="stage"></div>
    </div>

    <script>
        const ticketsData = [
            { id: 1, owners: "NIRAJ and KARAN / SAJIT" },
            { id: 2, owners: "ADITYA and NITU / NEHA" },
            { id: 3, owners: "SISHIR and ANUSH / SAJIT" },
            { id: 4, owners: "KARAN and NITU / ASHWIN" },
            { id: 5, owners: "ISHA and MAHESH / PRITY" },
            { id: 6, owners: "PRIYANKA and ANJALI / NEHA" },
            { id: 7, owners: "ANUSH and AYUSH / KRISHNA" },
            { id: 8, owners: "MANISHA and BICKEL / ASHWIN" },
            { id: 9, owners: "ADITYA and REHANT / REGAN" },
            { id: 10, owners: "RAHIM and AYUSH / NEHA" },
            { id: 11, owners: "SATISH and REGAN / NEHA" },
            { id: 12, owners: "PUJA and SISHIR / NEHA" },
            { id: 13, owners: "PRANILA and DIWAKAR / PRANIKA" },
            { id: 14, owners: "ISHA and SRISTY / KARAN" },
            { id: 15, owners: "PRAKASH and PUJA / SAJIT" },
            { id: 16, owners: "PRAKASH and SUJAN / SAJIT" },
            { id: 17, owners: "BICKEL and MAHESH / AMAN" },
            { id: 18, owners: "ADITYA and ANUJ / NEHA" },
            { id: 19, owners: "SUMER and ANJALI / KRISHNA" },
            { id: 20, owners: "RAHIM and AYUSH / MANTAY" },
            { id: 21, owners: "ADITYA and SURENDRA / NEHA" },
            { id: 22, owners: "SURENDRA and SUJAN / PRANIKA" },
            { id: 23, owners: "SURENDRA and NIRAJ / NEHA" }
        ];
        
        function startApp() {
            document.getElementById('page-1').style.display = 'none';
            document.getElementById('page-2').style.display = 'block';
            document.getElementById('bg-music').play();
            
            const grid = document.getElementById('grid');
            grid.innerHTML = ''; // Clear grid before generating
            
            ticketsData.forEach((t) => {
                grid.innerHTML += `
                    <div class="card" id="card-${t.id}">
                        <div class="creator-label">CREATOR- CHIRU</div>
                        <div class="locked-icon">🔒</div>
                        Ticket ${t.id}<br><b>${t.owners}</b>
                    </div>`;
            });
            
            // Sequential fade-in animation
            ticketsData.forEach((t, i) => {
                setTimeout(() => {
                    const el = document.getElementById(`card-${t.id}`);
                    if(el) el.style.opacity = "1";
                }, i * 3000); // 3 seconds delay each
            });
        }

        function reveal() {
            if(document.getElementById('code').value !== "GOAT VS TIKI TAKA") return alert("Wrong Code!");
            const num = document.getElementById('num').value.toUpperCase();
            document.getElementById('grid').style.display = 'none';
            
            if(num === 'ALL') ticketsData.forEach(t => show(t));
            else {
                const t = ticketsData.find(x => x.id == num);
                if(t) show(t);
            }
        }

        function show(t) {
            document.getElementById('stage').innerHTML += `
                <div class="revealed">
                    <h3>Ticket ${t.id} - ${t.owners}</h3>
                    <p>Revealed Content Here</p>
                </div>`;
        }
    </script>
</body>
</html>
