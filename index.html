<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FIFA 2026 Final</title>
    <style>
        body { margin: 0; font-family: 'Arial', sans-serif; text-align: center; overflow-x: hidden; }
        
        /* Vibrant Page 1 */
        #page-1 { background: linear-gradient(135deg, #87CEEB, #FF4500); padding: 40px 20px; min-height: 100vh; color: black; font-weight: bold; }
        .hero-img { width: 300px; border: 8px solid white; border-radius: 15px; margin: 10px; }
        
        /* Vibrant Page 2 */
        #page-2 { display: none; background: linear-gradient(135deg, #FFFF00, #0000FF); min-height: 100vh; padding: 20px; }
        
        /* Premium Parrot Green Tickets */
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding-top: 20px; }
        .card { 
            width: 160px; height: 200px; background: #7CFC00; border: 8px solid gold; 
            border-radius: 20px; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; position: relative; opacity: 0; transition: opacity 1s;
        }
        .watermark { position: absolute; transform: rotate(-45deg); font-size: 1.2rem; font-weight: 900; color: black; opacity: 0.5; }
        
        /* Effects */
        .flower { position: fixed; top: -50px; animation: fall 5s linear infinite; color: white; }
        @keyframes fall { to { transform: translateY(100vh); } }
        .burst { animation: firework 0.5s ease-out; }
        @keyframes firework { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <audio id="bg-music" src="music.mp3" loop autoplay></audio>
    
    <div id="page-1">
        <h1 style="font-size: 3rem;">WELCOME TO CHIRU'S WORLD OF GAME</h1>
        <h3>BUY TICKET FOR Rs 100 AND GET EXCITING PRIZE</h3>
        <p>1st prize- Rs 1200, 2nd Prize- 600 and 3rd prize- 200</p>
        <h2>FINAL OF FIFA WORLD CUP 2026</h2>
        <img src="WhatsApp-Image-2022-12-18-at-19.01.39.jpeg" class="hero-img">
        <h2 style="margin:10px;">VS</h2>
        <img src="images.jpeg" class="hero-img">
        <br><button onclick="startApp()" style="padding:20px 50px; font-size:24px; cursor:pointer;">ENTER</button>
    </div>

    <div id="page-2">
        <input id="code" placeholder="Secret Code">
        <input id="num" placeholder="Ticket Number or ALL">
        <button onclick="reveal()">REVEAL</button>
        <div class="grid" id="grid"></div>
        <div id="stage"></div>
    </div>

    <script>
        const ticketsData = [
            { id: 1, owners: "NIRAJ and KARAN / SAJIT", argentina: { name: "Messi", number: 10, photo: "images/argentina/messi.jpg" }, spain: { name: "Gavi", number: 9, photo: "images/spain/gavi.jpg" } },
            // ... Add your other 22 entries here following the same format
        ];
        
        function startApp() {
            document.getElementById('page-1').style.display = 'none';
            document.getElementById('page-2').style.display = 'block';
            document.getElementById('bg-music').play();
            
            // Flower effect
            for(let i=0; i<15; i++) {
                let f = document.createElement('div'); f.innerHTML = "✿"; f.className = "flower";
                f.style.left = Math.random()*100 + "vw"; f.style.animationDelay = Math.random()*5 + "s";
                document.body.appendChild(f);
            }

            const grid = document.getElementById('grid');
            ticketsData.forEach((t) => {
                grid.innerHTML += `
                    <div class="card" id="card-${t.id}">
                        <div class="watermark">CREATOR- CHIRU</div>
                        <div style="font-size:2rem">🔒</div>
                        Ticket ${t.id}<br><b>${t.owners}</b>
                    </div>`;
            });
            
            ticketsData.forEach((t, i) => {
                setTimeout(() => { document.getElementById(`card-${t.id}`).style.opacity = "1"; }, i * 3000);
            });
        }

        function reveal() {
            if(document.getElementById('code').value !== "GOAT VS TIKI TAKA") return alert("Wrong Code!");
            const num = document.getElementById('num').value.toUpperCase();
            document.getElementById('grid').style.display = 'none';
            document.getElementById('stage').className = 'burst';
            
            if(num === 'ALL') ticketsData.forEach(t => show(t));
            else {
                const t = ticketsData.find(x => x.id == num);
                if(t) show(t);
            }
        }

        function show(t) {
            document.getElementById('stage').innerHTML += `
                <div style="background:white; color:black; padding:20px; border: 5px solid gold; margin:10px;">
                    <h3>Ticket ${t.id} - ${t.owners}</h3>
                    <div style="display:flex; justify-content:space-around">
                        <div><img src="${t.argentina.photo}" width="80"><p>${t.argentina.name}</p></div>
                        <div><img src="${t.spain.photo}" width="80"><p>${t.spain.name}</p></div>
                    </div>
                </div>`;
        }
    </script>
</body>
</html>
