        body { background: linear-gradient(135deg, #87CEEB, #FF4500); color: #333; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; min-height: 100vh; }
        #page-1 { padding: 50px; color: white; }
        #page-2 { display: none; padding: 20px; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        /* Premium Ticket Card */
        .card { 
            width: 160px; background: white; padding: 20px; border-radius: 20px; 
            opacity: 0; transition: opacity 1s; border: 4px solid gold; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .locked-icon { font-size: 2rem; color: #FF4500; }
        .revealed { background: white; padding: 40px; border-radius: 30px; margin: 30px auto; max-width: 600px; border: 5px solid gold; }
    </style>
</head>

        <button onclick="startApp()" style="padding:20px 40px; font-size:24px; cursor:pointer;">ENTER</button>
    </div>

        <input id="num" placeholder="Ticket Number or ALL">

        ];

        function startApp() {
            document.getElementById('page-1').style.display = 'none';
            document.getElementById('page-2').style.display = 'block';
            document.getElementById('bg-music').play();
            const grid = document.getElementById('grid');
            ticketsData.forEach((t, i) => {
                grid.innerHTML += `<div class="card" id="card-${t.id}"><div class="locked-icon">🔒</div>Ticket ${t.id}<br><br><b>${t.owners}</b></div>`;
                setTimeout(() => document.getElementById(`card-${t.id}`).style.opacity = "1", i * 200);
            });
        }

        function reveal() {
            if(document.getElementById('code').value !== "GOAT VS TIKI TAKA") return alert("Wrong Code!");
            const num = document.getElementById('num').value.toUpperCase();
            document.getElementById('grid').style.display = 'none';
            if(num === 'ALL') ticketsData.forEach(t => show(t));
            else {
                const t = ticketsData.find(x => x.id == num);
                if(t) show(t);
            }
        }

        function show(t) {
            document.getElementById('stage').innerHTML += `
                <div class="revealed">
                    <h3>Ticket ${t.id} - ${t.owners}</h3>
                    <div style="display:flex; justify-content:space-around">
                        <div><img src="${t.argentina.photo}" width="100"><p>${t.argentina.name} #${t.argentina.number}</p></div>
                        <div><img src="${t.spain.photo}" width="100"><p>${t.spain.name} #${t.spain.number}</p></div>
                    </div>
                </div>`;
            const msg = new SpeechSynthesisUtterance(`Ticket ${t.id}, owner ${t.owners}. Argentina, ${t.argentina.name}. Spain, ${t.spain.name}.`);
            window.speechSynthesis.speak(msg);
        }
    </script>
