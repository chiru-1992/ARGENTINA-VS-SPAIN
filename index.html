<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA 2026 Final Tickets</title>
<style>
  /* VIBRANT ANIMATED BACKGROUND */
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e, #4a00e0, #8e2de2);
    background-size: 400% 400%;
    animation: gradientShift 12s ease infinite;
    color: #ffffff;
    text-align: center;
    margin: 0;
    padding: 0;
    overflow-x: hidden;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  
  /* PAGE 1: WELCOME SCREEN */
  #page-1 {
    padding: 30px 20px;
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .music-btn {
    background: #ff007f;
    color: white;
    border: none;
    padding: 10px 25px;
    border-radius: 30px;
    font-size: 1.2rem;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 20px;
    box-shadow: 0 4px 15px rgba(255, 0, 127, 0.6);
    animation: pulseMusic 2s infinite;
  }

  @keyframes pulseMusic {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }
  
  #page-1 h1 {
    font-size: 4rem;
    color: #fff;
    margin-bottom: 5px;
    text-transform: uppercase;
    text-shadow: 0 4px 15px rgba(0,0,0,0.8), 0 0 25px #00dfd8;
    line-height: 1.2;
  }
  
  #page-1 h2 {
    font-size: 2rem;
    color: #fbbf24;
    margin-bottom: 15px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.8);
  }
  
  #page-1 h3 {
    font-size: 1.4rem;
    color: #fff;
    background: rgba(0,0,0,0.5);
    padding: 12px 30px;
    border-radius: 50px;
    border: 2px solid #fbbf24;
    box-shadow: 0 0 20px #fbbf24;
    margin-bottom: 30px;
  }

  /* BIG CLEAR IMAGES ON PAGE 1 */
  .hero-images {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 30px;
    margin-bottom: 40px;
    width: 100%;
  }

  .hero-img {
    width: 45%; 
    max-width: 600px;
    height: auto;
    border-radius: 20px;
    border: 6px solid #fff;
    box-shadow: 0 15px 40px rgba(0,0,0,0.8), 0 0 30px rgba(255, 255, 255, 0.4);
    object-fit: cover;
  }

  .vs-text {
    font-size: 5rem;
    font-weight: 900;
    color: #ff007f;
    text-shadow: 0 0 20px #fff, 0 5px 15px rgba(0,0,0,0.9);
    font-style: italic;
    z-index: 2;
  }
  
  .enter-btn {
    padding: 20px 50px;
    font-size: 2rem;
    border: none;
    border-radius: 15px;
    background: linear-gradient(135deg, #00dfd8 0%, #0070f3 100%);
    color: #fff;
    cursor: pointer;
    font-weight: 900;
    box-shadow: 0 10px 30px rgba(0, 223, 216, 0.6);
    transition: all 0.3s;
  }
  
  .enter-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 15px 40px rgba(0, 223, 216, 0.9);
  }

  /* PAGE 2: DASHBOARD */
  #page-2 {
    display: none;
    padding: 30px 20px;
    min-height: 100vh;
  }

  /* SEPARATE INPUT BOXES */
  .controls-bar {
    background: rgba(0,0,0,0.6);
    padding: 25px;
    border-radius: 20px;
    display: inline-flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    align-items: center;
    margin-bottom: 40px;
    border: 2px solid #ff007f;
    box-shadow: 0 0 25px rgba(255, 0, 127, 0.5);
  }

  .input-group {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .input-group label {
    font-size: 1.1rem;
    font-weight: bold;
    color: #fbbf24;
    margin-bottom: 5px;
    text-transform: uppercase;
  }

  .controls-bar input {
    padding: 15px;
    font-size: 1.2rem;
    border-radius: 8px;
    border: 3px solid #00dfd8;
    background-color: #fff;
    color: #000;
    outline: none;
    width: 280px;
    text-align: center;
    font-weight: bold;
  }

  .controls-bar button {
    padding: 15px 40px;
    font-size: 1.5rem;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg, #ff007f 0%, #7928ca 100%);
    color: #fff;
    cursor: pointer;
    font-weight: 900;
    box-shadow: 0 4px 15px rgba(255, 0, 127, 0.5);
    margin-top: 25px;
    transition: all 0.3s;
  }

  .controls-bar button:hover {
    transform: scale(1.05);
  }

  /* LOCKED TICKETS GRID */
  #locked-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    max-width: 1300px;
    margin: 0 auto;
  }

  .locked-card {
    background: linear-gradient(to bottom, #1e293b, #0f172a);
    border: 2px solid #00dfd8;
    border-radius: 12px;
    width: 160px;
    height: 220px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #00dfd8;
    font-weight: bold;
    font-size: 1.3rem;
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    padding: 10px;
    box-sizing: border-box;
    transition: all 0.5s;
  }

  .locked-card.diluted {
    opacity: 0.2;
    transform: scale(0.8);
    filter: blur(2px);
    pointer-events: none;
  }

  .locked-icon {
    font-size: 3.5rem;
    margin-bottom: 10px;
  }
  
  .locked-owner {
    font-size: 0.9rem;
    color: #fbbf24;
    margin-top: 10px;
    text-align: center;
    text-transform: uppercase;
  }

  /* SINGLE TICKET DISPLAY (CLOSER AND BIGGER) */
  .ticket-container {
    position: fixed;
    top: 55%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    max-width: 900px; 
    perspective: 2000px;
    display: none; 
    z-index: 100;
  }
  
  .ticket {
    margin: 0 auto;
    width: 100%;
    background: linear-gradient(135deg, #ffffff 0%, #e2e8f0 100%);
    color: #0f172a;
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 50px 100px rgba(0,0,0,0.9), 0 0 50px rgba(0, 223, 216, 0.5);
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.8s cubic-bezier(0.25, 1.2, 0.5, 1); 
    box-sizing: border-box;
  }
  
  .ticket.active {
    opacity: 1;
    transform: scale(1.15); /* Makes the single ticket large and prominent */
  }
  
  .ticket.diluted {
    opacity: 0;
    transform: scale(1.5) translateY(-200px);
    transition: all 1s ease-in;
  }

  /* ALL TICKETS GRID VIEW */
  #all-tickets-grid {
    display: none; 
    flex-wrap: wrap;
    justify-content: center;
    gap: 40px;
    padding: 40px;
    max-width: 1400px;
    margin: 0 auto;
  }

  #all-tickets-grid .ticket-static {
    background: linear-gradient(135deg, #ffffff 0%, #e2e8f0 100%);
    color: #0f172a;
    border-radius: 20px;
    padding: 25px;
    width: 400px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.8), 0 0 20px rgba(251, 191, 36, 0.4);
    transition: transform 0.3s;
  }

  #all-tickets-grid .ticket-static:hover {
    transform: scale(1.05);
  }
  
  /* Ticket Internals */
  .ticket-header {
    border-bottom: 4px dashed #94a3b8;
    padding-bottom: 15px;
    margin-bottom: 25px;
  }
  
  .ticket-header h3 {
    margin: 0;
    font-size: 2.8rem;
    color: #0f172a;
  }
  
  .ticket-owner-text {
    font-size: 1.2rem;
    color: #ff007f;
    font-weight: bold;
    margin-top: 5px;
    text-transform: uppercase;
  }
  
  .players-reveal {
    opacity: 0;
    transform: translateY(30px);
    transition: all 1s ease-out;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .players-reveal.show, .ticket-static .players-reveal {
    opacity: 1;
    transform: translateY(0);
  }
  
  .player {
    text-align: center;
    width: 42%;
    background: #f8fafc;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
  
  .player h4 { margin: 0 0 10px 0; font-size: 1.6rem; text-transform: uppercase; }
  .arg-title { color: #0284c7; }
  .esp-title { color: #dc2626; }
  
  .player p { font-weight: 900; font-size: 1.4rem; margin: 5px 0; color: #0f172a; }
  .player span { font-size: 1.1rem; color: #64748b; font-weight: bold; }
  
  .player img {
    width: 150px;
    height: 150px;
    margin-top: 15px;
    object-fit: cover;
    border-radius: 50%;
    border: 5px solid #e2e8f0;
    box-shadow: 0 8px 16px rgba(0,0,0,0.2);
  }

  .ticket-static .player img { width: 110px; height: 110px; }
  
  .vs-badge {
    font-size: 2.5rem;
    font-weight: 900;
    color: #ef4444;
    text-shadow: 2px 2px 0 #000;
  }
</style>
</head>

<!-- CONTAINERS FOR REVEALS -->
<div class="ticket-container" id="tickets-wrapper"></div>
<div id="all-tickets-grid"></div>

    { id: 8, owners: "MANISHA and BICKEL", argentina: { name: "Cristian ROMERO", number: 13, photo: "images/argentina/cristian_romero.jpg" }, spain: { name: "Alex BAENA", number: 15, photo: "images/spain/alex_baena.jpg" } },
    { id: 9, owners: "ADITYA and REHANT", argentina: { name: "Exequiel PALACIOS", number: 14, photo: "images/argentina/exequiel_palacios.jpg" }, spain: { name: "Marcos LLORENTE", number: 5, photo: "images/spain/marcos_llorente.jpg" } },
    { id: 10, owners: "RAHIM and AYUSH", argentina: { name: "Lisandro MARTINEZ", number: 6, photo: "images/argentina/lisandro_martinez.jpg" }, spain: { name: "GAVI", number: 9, photo: "images/spain/gavi.jpg" } },
    { id: 11, owners: "SATISH and REGAN", argentina: { name: "Giovani LO CELSO", number: 11, photo: "images/argentina/giovani_lo_celso.jpg" }, spain: { name: "Marc PUBILL", number: 2, photo: "images/spain/marc_pubill.jpg" } },
    { id: 12, owners: "PUJA and SISHIR", argentina: { name: "Nicolas TAGLIAFICO", number: 3, photo: "images/argentina/nicolas_tagliafico.jpg" }, spain: { name: "Fabian RUIZ", number: 8, photo: "images/spain/fabian_ruiz.jpg" } },
    { id: 13, owners: "PRANILA and DIWAKAR", argentina: { name: "Lautaro MARTINEZ", number: 22, photo: "images/argentina/lautaro_martinez.jpg" }, spain: { name: "Alex GRIMALDO", number: 3, photo: "images/spain/alex_grimaldo.jpg" } },
    { id: 14, owners: "ISHA and SRISTY", argentina: { name: "Marcos SENESI", number: 2, photo: "images/argentina/marcos_senesi.jpg" }, spain: { name: "Mikel OYARZABAL", number: 21, photo: "images/spain/mikel_oyarzabal.jpg" } },
    { id: 15, owners: "PRAKASH and PUJA", argentina: { name: "Julian ALVAREZ", number: 9, photo: "images/argentina/julian_alvarez.jpg" }, spain: { name: "Eric GARCIA", number: 4, photo: "images/spain/eric_garcia.jpg" } },
    { id: 16, owners: "PRAKASH and SUJAN", argentina: { name: "Gonzalo MONTIEL", number: 4, photo: "images/argentina/gonzalo_montiel.jpg" }, spain: { name: "Ferran TORRES", number: 7, photo: "images/spain/ferran_torres.jpg" } },
    { id: 17, owners: "BICKEL and MAHESH", argentina: { name: "Jose Manuel LOPEZ", number: 21, photo: "images/argentina/jose_manuel_lopez.jpg" }, spain: { name: "Mikel MERINO", number: 6, photo: "images/spain/mikel_merino.jpg" } },
    { id: 18, owners: "ADITYA and ANUJ", argentina: { name: "Valentin BARCO", number: 8, photo: "images/argentina/valentina_barco.jpg" }, spain: { name: "Borja IGLESIAS", number: 26, photo: "images/spain/borja_iglesias.jpg" } },
    { id: 19, owners: "SUMER and ANJALI", argentina: { name: "Nico PAZ", number: 18, photo: "images/argentina/nico_paz.jpg" }, spain: { name: "Victor MUNOZ", number: 25, photo: "images/spain/victor_munoz.jpg" } },
    { id: 20, owners: "RAHIM and AYUSH", argentina: { name: "Rodrigo DE PAUL", number: 7, photo: "images/argentina/rodrigo_de_paul.jpg" }, spain: { name: "Lamine YAMAL", number: 19, photo: "images/spain/lamine_yamal.jpg" } },
    { id: 21, owners: "ADITYA and SURENDRA", argentina: { name: "Giuliano SIMEONE", number: 17, photo: "images/argentina/giuliano_simeone.jpg" }, spain: { name: "Nico WILLIAMS", number: 17, photo: "images/spain/nico_williams.jpg" } },
    { id: 22, owners: "SURENDRA and SUJAN", argentina: { name: "Leandro PAREDES", number: 5, photo: "images/argentina/leandro_paredes.jpg" }, spain: { name: "Yeremy PINO", number: 11, photo: "images/spain/yeremy_pino.jpg" } },
    { id: 23, owners: "SURENDRA and NIRAJ", argentina: { name: "Thiago ALMADA", number: 16, photo: "images/argentina/thiayo_almada.jpg" }, spain: { name: "Dani OLMO", number: 10, photo: "images/spain/dani_olmo.jpg" } }
  ];

  // Transition from Page 1 to Page 2 & Ensure Music is Playing
  function enterApp() {
    document.getElementById('page-1').style.display = 'none';
    document.getElementById('page-2').style.display = 'block';
    
    const bgMusic = document.getElementById('bg-music');
    bgMusic.volume = 0.5;
    bgMusic.play().catch(e => console.log("Music play blocked. User must click the Start Music button."));

    initLockedGrid();
  }

  // Draw 23 Locked Tickets
  function initLockedGrid() {
    const grid = document.getElementById('locked-grid');
    grid.innerHTML = '';
    ticketsData.forEach(t => {
      grid.innerHTML += `
        <div class="locked-card" id="locked-${t.id}">
          <div class="locked-icon">🔒</div>
          Ticket ${t.id}
          <div class="locked-owner">${t.owners}</div>
        </div>
      `;
    });
  }

  // HTML Generator for tickets
  function createTicketHTML(ticket) {
    return `
      <div class="ticket-header">
        <h3>Ticket Number ${ticket.id}</h3>
        <div class="ticket-owner-text">Owner: ${ticket.owners}</div>
      </div>
      <div class="players-reveal" id="reveal-${ticket.id}">
        <div class="player">
          <h4 class="arg-title">Argentina</h4>
          <p>${ticket.argentina.name}</p>
          <span>Jersey #${ticket.argentina.number}</span>
          <img src="${ticket.argentina.photo}" alt="ARG" onerror="this.src='https://via.placeholder.com/150/7dd3fc/000000?text=ARG'">
        </div>
        <div class="vs-badge">VS</div>
        <div class="player">
          <h4 class="esp-title">Spain</h4>
          <p>${ticket.spain.name}</p>
          <span>Jersey #${ticket.spain.number}</span>
          <img src="${ticket.spain.photo}" alt="ESP" onerror="this.src='https://via.placeholder.com/150/fca5a5/000000?text=ESP'">
        </div>
      </div>
    `;
  }

  // VOICE PRONUNCIATION
  function speakAnnouncement(ticket) {
    if ('speechSynthesis' in window) {
      const text = `Ticket ${ticket.id}, owned by ${ticket.owners}. Argentina, ${ticket.argentina.name}, number ${ticket.argentina.number}. Versus Spain, ${ticket.spain.name}, number ${ticket.spain.number}.`;
      const msg = new SpeechSynthesisUtterance(text);
      msg.rate = 0.95;
      window.speechSynthesis.speak(msg);
    }
  }

  // MASTER REVEAL LOGIC WITH SEPARATE FIELDS
  function processReveal() {
    const codeVal = document.getElementById('secret-code').value.trim().toUpperCase();
    const numVal = document.getElementById('ticket-num').value.trim().toUpperCase();
    
    // Play stadium cheer
    const cheer = document.getElementById('stadium-cheer');
    cheer.volume = 0.6;
    cheer.play().catch(e => console.log("Cheer audio skipped"));

    // Check Secret Code First
    if (codeVal === 'GOAT VS TIKI TAKA') {
      document.getElementById('locked-grid').style.display = 'none';
      document.getElementById('controls').style.display = 'none';
      playSequence();
      return;
    } 

    // Check Ticket Number Input Second
    if (numVal === 'ALL') {
      document.getElementById('locked-grid').style.display = 'none';
      document.getElementById('controls').style.display = 'none';
      showAllTickets();
    } else if (numVal !== '') {
      const num = parseInt(numVal);
      if (!isNaN(num) && num >= 1 && num <= 23) {
        showOneTicket(num);
      } else {
        alert("Invalid ticket number! Enter a number from 1 to 23, or type ALL.");
      }
    } else {
      alert("Please enter either a Ticket Number or the Secret Code!");
    }
  }

  // Action 1: Show "ALL" Grid
  function showAllTickets() {
    document.getElementById('tickets-wrapper').style.display = 'none';
    
    const grid = document.getElementById('all-tickets-grid');
    grid.style.display = 'flex';
    grid.innerHTML = '';
    
    window.speechSynthesis.cancel();
    if ('speechSynthesis' in window) {
      window.speechSynthesis.speak(new SpeechSynthesisUtterance("All tickets revealed."));
    }

    ticketsData.forEach(t => {
      grid.innerHTML += `<div class="ticket-static">${createTicketHTML(t)}</div>`;
    });
  }

  // Action 2: Show specifically ONE ticket number
  function showOneTicket(id) {
    // Dilute (blur/fade) all OTHER locked tickets
    for(let i = 1; i <= 23; i++) {
      const lockedCard = document.getElementById('locked-' + i);
      if(i !== id) {
        lockedCard.classList.add('diluted');
      } else {
        lockedCard.classList.remove('diluted');
      }
    }

    const wrapper = document.getElementById('tickets-wrapper');
    wrapper.style.display = 'block';
    wrapper.innerHTML = ''; 
    
    const ticket = ticketsData.find(t => t.id === id);
    const div = document.createElement('div');
    div.className = 'ticket active'; // Automatically scales up big and close
    div.innerHTML = createTicketHTML(ticket);
    wrapper.appendChild(div);
    
    setTimeout(() => {
      document.getElementById('locked-grid').style.display = 'none';
      document.getElementById('controls').style.display = 'none';
      
      div.querySelector('.players-reveal').classList.add('show');
      window.speechSynthesis.cancel();
      speakAnnouncement(ticket);
    }, 1000);
  }

  // Action 3: Play animated sequence
  function playSequence() {
    const wrapper = document.getElementById('tickets-wrapper');
    wrapper.style.display = 'block';
    wrapper.innerHTML = '';
    
    ticketsData.forEach(t => {
      const div = document.createElement('div');
      div.className = 'ticket';
      div.id = 'ticket-' + t.id;
      div.innerHTML = createTicketHTML(t);
      wrapper.appendChild(div);
    });

    let current = 1;
    function next() {
      if (current > ticketsData.length) return;
      
      const el = document.getElementById('ticket-' + current);
      const data = ticketsData.find(t => t.id === current);
      
      el.classList.add('active'); 
      
      setTimeout(() => {
        el.querySelector('.players-reveal').classList.add('show');
        speakAnnouncement(data); 
      }, 1000);
      
      setTimeout(() => {
        el.classList.remove('active');
        el.classList.add('diluted'); 
        current++;
        next();
      }, 11000); 
    }
    window.speechSynthesis.cancel();
    next();
  }
</script>
</body>
</html>
