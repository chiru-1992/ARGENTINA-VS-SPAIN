<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FIFA 2026 Final Tickets</title>
<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    /* Sky Blue Background with Firecracker Effect */
    background: radial-gradient(circle, #87CEEB 0%, #0077be 100%);
    color: #fff;
    text-align: center;
    margin: 0;
    padding: 0;
    overflow-x: hidden;
  }

  /* Firecracker Burst Animation Overlay */
  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: url('https://www.transparenttextures.com/patterns/stardust.png');
    pointer-events: none;
    animation: firework 2s infinite;
  }

  @keyframes firework {
    0% { opacity: 0.2; }
    50% { opacity: 0.8; transform: scale(1.1); }
    100% { opacity: 0.2; }
  }

  #page-1 { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  
  .hero-img { width: 400px; border-radius: 20px; border: 5px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

  /* Premium Ticket Styling */
  .ticket {
    width: 600px;
    height: 400px;
    background: white;
    border-radius: 20px;
    margin: 50px auto;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 2s ease-in-out;
    cursor: pointer;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  }

  .ticket.flip { transform: rotateY(180deg); }

  .ticket-face {
    position: absolute;
    width: 100%; height: 100%;
    backface-visibility: hidden;
    display: flex;
    justify-content: space-around;
    align-items: center;
    border-radius: 20px;
  }

  .front { background: #f1f1f1; }
  .back { transform: rotateY(180deg); background: white; padding: 20px; box-sizing: border-box; }

  /* Flag Backgrounds */
  .arg-side { background: linear-gradient(rgba(135,206,250,0.8), rgba(255,255,255,0.8)); }
  .esp-side { background: linear-gradient(rgba(255,69,0,0.8), rgba(255,215,0,0.8)); }

  .player-box { width: 45%; text-align: center; opacity: 0; transition: opacity 2s; }
  .player-box.show { opacity: 1; }
  .player-box img { width: 120px; height: 120px; border-radius: 50%; border: 4px solid white; }

  #page-2 { display: none; padding-top: 50px; }
  .locked-card { font-weight: bold; font-size: 1.2rem; background: rgba(0,0,0,0.3); border: 2px solid gold; padding: 10px; width: 150px; border-radius: 10px; }
  .locked-owner { font-weight: 800; font-size: 1rem; color: gold; }
</style>
</head>
<body>

<audio id="bg-music" src="music.mp3" loop></audio>

<div id="page-1">
  <h1>FIFA 2026 FINAL</h1>
  <div class="hero-images">
    <img src="WhatsApp-Image-2022-12-18-at-19.01.39.jpeg" class="hero-img">
    <img src="images.jpeg" class="hero-img">
  </div>
  <button class="enter-btn" onclick="enterApp()">ENTER</button>
</div>

<div id="page-2">
  <div class="controls-bar">
    <input type="text" id="secret-code" placeholder="Secret Code">
    <input type="text" id="ticket-num" placeholder="Ticket Number">
    <button onclick="processReveal()">REVEAL</button>
  </div>
  <div id="locked-grid" style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center;"></div>
  <div id="ticket-stage"></div>
</div>

<script>
  const ticketsData = [ /* Paste your full ticketsData array here */ ];

  function enterApp() {
    document.getElementById('page-1').style.display = 'none';
    document.getElementById('page-2').style.display = 'block';
    document.getElementById('bg-music').play();
    
    const grid = document.getElementById('locked-grid');
    ticketsData.forEach(t => {
      grid.innerHTML += `
        <div class="locked-card">
          Ticket ${t.id}
          <div class="locked-owner"><b>${t.owners}</b></div>
        </div>
      `;
    });
  }

  function processReveal() {

    showOneTicket(id);
  }

  function showOneTicket(id) {
    document.getElementById('locked-grid').style.display = 'none';
    const stage = document.getElementById('ticket-stage');
    const t = ticketsData.find(x => x.id === id);
    
    stage.innerHTML = `
      <div class="ticket" id="main-ticket" onclick="flipTicket()">
        <div class="ticket-face front"><h2>PREMIUM TICKET ${t.id}</h2><p><b>${t.owners}</b></p></div>
        <div class="ticket-face back">
          <div class="player-box arg-side" id="p1"><h4>Argentina</h4><img src="${t.argentina.photo}"><p>${t.argentina.name}</p></div>
          <div class="player-box esp-side" id="p2"><h4>Spain</h4><img src="${t.spain.photo}"><p>${t.spain.name}</p></div>
        </div>
      </div>
    `;
  }

  function flipTicket() {
    document.getElementById('main-ticket').classList.add('flip');
    setTimeout(() => document.getElementById('p1').classList.add('show'), 1500);
    setTimeout(() => document.getElementById('p2').classList.add('show'), 3000);
  }
</script>
</body>
</html>
