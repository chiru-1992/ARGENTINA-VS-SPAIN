<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA 2026 Final Tickets</title>
<style>
  /* 1. EXTREMELY COLORFUL MOVING BACKGROUND */
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(45deg, #ff007f, #7928ca, #0070f3, #00dfd8);
    background-size: 300% 300%;
    animation: colorfulBG 10s ease infinite;
    color: #ffffff;
    text-align: center;
    margin: 0;
    padding: 0;
    overflow-x: hidden;
  }

  @keyframes colorfulBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  
  /* 2. WELCOME PAGE TEXT STYLING */
  #welcome-screen {
    padding: 50px 20px;
    max-width: 1000px;
    margin: 0 auto;
  }
  
  h1 {
    font-size: 3.5rem;
    color: #fff;
    margin-bottom: 10px;
    text-transform: uppercase;
    text-shadow: 0 4px 10px rgba(0,0,0,0.5), 0 0 20px #ff007f;
  }
  
  h2 {
    font-size: 2rem;
    color: #fbbf24;
    margin-bottom: 20px;
    text-shadow: 0 2px 5px rgba(0,0,0,0.5);
  }
  
  h3 {
    font-size: 1.3rem;
    color: #fff;
    background: rgba(0,0,0,0.4);
    display: inline-block;
    padding: 15px 30px;
    border-radius: 50px;
    margin-bottom: 30px;
    border: 2px solid #00dfd8;
    box-shadow: 0 0 15px #00dfd8;
  }
  
  #unlock-section {
    margin-bottom: 40px;
  }
  
  input[type="text"] {
    padding: 15px 20px;
    font-size: 1.2rem;
    border-radius: 8px;
    border: 3px solid #fbbf24;
    background-color: rgba(255,255,255,0.9);
    color: #000;
    outline: none;
    width: 350px;
    text-align: center;
    font-weight: bold;
  }
  
  button {
    padding: 15px 30px;
    font-size: 1.2rem;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
    color: #000;
    cursor: pointer;
    font-weight: 900;
    margin-left: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  }
  
  button:hover {
    transform: scale(1.05);
  }

  /* 6. LOCKED TICKETS GRID */
  #locked-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    margin-top: 30px;
  }

  .locked-card {
    background: linear-gradient(to bottom, #1e293b, #0f172a);
    border: 2px solid #fbbf24;
    border-radius: 12px;
    width: 130px;
    height: 180px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fbbf24;
    font-weight: bold;
    font-size: 1.1rem;
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
  }
  
  .locked-icon {
    font-size: 2.5rem;
    margin-bottom: 10px;
  }

  /* 3. TICKET COMING CLOSER & LARGER */
  .ticket-container {
    position: relative;
    width: 100%;
    max-width: 900px; /* Made container larger */
    margin: 40px auto;
    height: 600px;
    perspective: 1500px;
    display: none; 
  }
  
  .ticket {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%) translateZ(-1500px) scale(0.2);
    width: 100%;
    background: linear-gradient(135deg, #ffffff 0%, #e2e8f0 100%);
    color: #0f172a;
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.9);
    opacity: 0;
    transition: all 1.8s cubic-bezier(0.25, 1.2, 0.5, 1); /* Bouncy effect */
    box-sizing: border-box;
  }
  
  .ticket.active {
    /* Comes VERY close and scales up */
    transform: translateX(-50%) translateZ(200px) scale(1.1); 
    opacity: 1;
    z-index: 10;
  }
  
  .ticket.diluted {
    transform: translateX(-50%) translateZ(800px) translateY(-200px) scale(1.5);
    opacity: 0;
    z-index: 1;
    transition: all 1.5s ease-in;
  }

  /* 5. ALL TICKETS GRID VIEW */
  #all-tickets-grid {
    display: none; 
    flex-wrap: wrap;
    justify-content: center;
    gap: 30px;
    padding: 40px;
  }

  #all-tickets-grid .ticket-static {
    background: linear-gradient(135deg, #ffffff 0%, #e2e8f0 100%);
    color: #0f172a;
    border-radius: 16px;
    padding: 20px;
    width: 380px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  }
  
  /* Ticket Internals */
  .ticket-header {
    border-bottom: 4px dashed #94a3b8;
    padding-bottom: 15px;
    margin-bottom: 25px;
  }
  
  .ticket-header h3 {
    margin: 0;
    font-size: 2.5rem;
    color: #0f172a;
    text-shadow: none;
    background: none;
    border: none;
    padding: 0;
    box-shadow: none;
  }
  
  .players-reveal {
    opacity: 0;
    transform: translateY(30px);
    transition: all 1.5s ease-out;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .players-reveal.show, .ticket-static .players-reveal {
    opacity: 1;
    transform: translateY(0);
  }
  
  .player {
    text-align: center;
    width: 42%;
    background: #f8fafc;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
  
  .player h4 { margin: 0 0 10px 0; font-size: 1.6rem; text-transform: uppercase; }
  .arg-title { color: #0284c7; }
  .esp-title { color: #dc2626; }
  
  .player p { font-weight: 900; font-size: 1.4rem; margin: 5px 0; color: #0f172a; }
  .player span { font-size: 1.1rem; color: #64748b; font-weight: bold; }
  
  .player img {
    width: 150px;
    height: 150px;
    margin-top: 15px;
    object-fit: cover;
    border-radius: 50%;
    border: 5px solid #e2e8f0;
    box-shadow: 0 8px 16px rgba(0,0,0,0.2);
  }

  .ticket-static .player img { width: 100px; height: 100px; }
  
  .vs-badge {
    font-size: 2.5rem;
    font-weight: 900;
    color: #ef4444;
    text-shadow: 2px 2px 0 #000;
  }
</style>
</head>
<body>

<!-- 4. AUDIO SOURCE (Crowd Cheering) -->
<audio id="stadium-cheer" src="https://actions.google.com/sounds/v1/crowds/crowd_cheer.ogg" preload="auto"></audio>

<!-- HOME SCREEN -->
<div id="welcome-screen">
  <!-- 2. EXACT TEXT REQUESTED -->
  <h1>WELCOME TO FIFA WORLD CUP FINAL 2026</h1>
  <h2>CREATOR - CHIRANJEEVI GURUNG</h2>
  <h3>please ask for code to creator to see your ticket</h3>
  
  <div id="unlock-section">
    <input type="text" id="reveal-code" placeholder="Enter Code (ALL, 1-23, or GOAT)">
    <button onclick="processCode()">Reveal Ticket</button>
  </div>

  <!-- 6. LOCKED TICKETS VISIBLE IMMEDIATELY -->
  <div id="locked-grid"></div>
</div>

<!-- SINGLE / SEQUENCE TICKET AREA -->
<div class="ticket-container" id="tickets-wrapper"></div>

<!-- ALL TICKETS GRID AREA -->
<div id="all-tickets-grid"></div>

<script>
  // Player Data (Messi at 2, Forwards held back)
  const ticketsData = [
    { id: 1, argentina: { name: "Nahuel MOLINA", number: 26, photo: "images/argentina/nahuel_molina.jpg" }, spain: { name: "PEDRI", number: 20, photo: "images/spain/pedri.jpg" } },
    { id: 2, argentina: { name: "Lionel MESSI", number: 10, photo: "images/argentina/lionel_messi.jpg" }, spain: { name: "Marc CUCURELLA", number: 24, photo: "images/spain/marc_cucurella.jpg" } },
    { id: 3, argentina: { name: "Enzo FERNANDEZ", number: 24, photo: "images/argentina/enzo_fernandez.jpg" }, spain: { name: "Pau CUBARSI", number: 22, photo: "images/spain/pau_cubarsi.jpg" } },
    { id: 4, argentina: { name: "Facundo MEDINA", number: 25, photo: "images/argentina/facundo_medina.jpg" }, spain: { name: "Martin ZUBIMENDI", number: 18, photo: "images/spain/martin_zubimendi.jpg" } },
    { id: 5, argentina: { name: "Alexis MAC ALLISTER", number: 20, photo: "images/argentina/alexis_mac_allister.jpg" }, spain: { name: "Aymeric LAPORTE", number: 14, photo: "images/spain/aymeric_laporte.jpg" } },
    { id: 6, argentina: { name: "Nicolas OTAMENDI", number: 19, photo: "images/argentina/nicolas_otamendi.jpg" }, spain: { name: "RODRI", number: 16, photo: "images/spain/rodri.jpg" } },
    { id: 7, argentina: { name: "Nico GONZALEZ", number: 15, photo: "images/argentina/nico_gonzalez.jpg" }, spain: { name: "Pedro PORRO", number: 12, photo: "images/spain/pedro_porro.jpg" } },
    { id: 8, argentina: { name: "Cristian ROMERO", number: 13, photo: "images/argentina/cristian_romero.jpg" }, spain: { name: "Alex BAENA", number: 15, photo: "images/spain/alex_baena.jpg" } },
    { id: 9, argentina: { name: "Exequiel PALACIOS", number: 14, photo: "images/argentina/exequiel_palacios.jpg" }, spain: { name: "Marcos LLORENTE", number: 5, photo: "images/spain/marcos_llorente.jpg" } },
    { id: 10, argentina: { name: "Lisandro MARTINEZ", number: 6, photo: "images/argentina/lisandro_martinez.jpg" }, spain: { name: "GAVI", number: 9, photo: "images/spain/gavi.jpg" } },
    { id: 11, argentina: { name: "Giovani LO CELSO", number: 11, photo: "images/argentina/giovani_lo_celso.jpg" }, spain: { name: "Marc PUBILL", number: 2, photo: "images/spain/marc_pubill.jpg" } },
    { id: 12, argentina: { name: "Nicolas TAGLIAFICO", number: 3, photo: "images/argentina/nicolas_tagliafico.jpg" }, spain: { name: "Fabian RUIZ", number: 8, photo: "images/spain/fabian_ruiz.jpg" } },
    { id: 13, argentina: { name: "Lautaro MARTINEZ", number: 22, photo: "images/argentina/lautaro_martinez.jpg" }, spain: { name: "Alex GRIMALDO", number: 3, photo: "images/spain/alex_grimaldo.jpg" } },
    { id: 14, argentina: { name: "Marcos SENESI", number: 2, photo: "images/argentina/marcos_senesi.jpg" }, spain: { name: "Mikel OYARZABAL", number: 21, photo: "images/spain/mikel_oyarzabal.jpg" } },
    { id: 15, argentina: { name: "Julian ALVAREZ", number: 9, photo: "images/argentina/julian_alvarez.jpg" }, spain: { name: "Eric GARCIA", number: 4, photo: "images/spain/eric_garcia.jpg" } },
    { id: 16, argentina: { name: "Gonzalo MONTIEL", number: 4, photo: "images/argentina/gonzalo_montiel.jpg" }, spain: { name: "Ferran TORRES", number: 7, photo: "images/spain/ferran_torres.jpg" } },
    { id: 17, argentina: { name: "Jose Manuel LOPEZ", number: 21, photo: "images/argentina/jose_manuel_lopez.jpg" }, spain: { name: "Mikel MERINO", number: 6, photo: "images/spain/mikel_merino.jpg" } },
    { id: 18, argentina: { name: "Valentin BARCO", number: 8, photo: "images/argentina/valentina_barco.jpg" }, spain: { name: "Borja IGLESIAS", number: 26, photo: "images/spain/borja_iglesias.jpg" } },
    { id: 19, argentina: { name: "Nico PAZ", number: 18, photo: "images/argentina/nico_paz.jpg" }, spain: { name: "Victor MUNOZ", number: 25, photo: "images/spain/victor_munoz.jpg" } },
    { id: 20, argentina: { name: "Rodrigo DE PAUL", number: 7, photo: "images/argentina/rodrigo_de_paul.jpg" }, spain: { name: "Lamine YAMAL", number: 19, photo: "images/spain/lamine_yamal.jpg" } },
    { id: 21, argentina: { name: "Giuliano SIMEONE", number: 17, photo: "images/argentina/giuliano_simeone.jpg" }, spain: { name: "Nico WILLIAMS", number: 17, photo: "images/spain/nico_williams.jpg" } },
    { id: 22, argentina: { name: "Leandro PAREDES", number: 5, photo: "images/argentina/leandro_paredes.jpg" }, spain: { name: "Yeremy PINO", number: 11, photo: "images/spain/yeremy_pino.jpg" } },
    { id: 23, argentina: { name: "Thiago ALMADA", number: 16, photo: "images/argentina/thiayo_almada.jpg" }, spain: { name: "Dani OLMO", number: 10, photo: "images/spain/dani_olmo.jpg" } }
  ];

  // Draw 23 Locked Tickets
  function initLockedGrid() {
    const grid = document.getElementById('locked-grid');
    for(let i = 1; i <= 23; i++) {
      grid.innerHTML += `<div class="locked-card"><div class="locked-icon">🔒</div>Ticket ${i}</div>`;
    }
  }

  // Create HTML structure for a ticket
  function createTicketHTML(ticket) {
    return `
      <div class="ticket-header">
        <h3>Ticket Number ${ticket.id}</h3>
      </div>
      <div class="players-reveal" id="reveal-${ticket.id}">
        <div class="player">
          <h4 class="arg-title">Argentina</h4>
          <p>${ticket.argentina.name}</p>
          <span>Jersey #${ticket.argentina.number}</span>
          <img src="${ticket.argentina.photo}" alt="ARG" onerror="this.src='https://via.placeholder.com/150/7dd3fc/000000?text=ARG'">
        </div>
        <div class="vs-badge">VS</div>
        <div class="player">
          <h4 class="esp-title">Spain</h4>
          <p>${ticket.spain.name}</p>
          <span>Jersey #${ticket.spain.number}</span>
          <img src="${ticket.spain.photo}" alt="ESP" onerror="this.src='https://via.placeholder.com/150/fca5a5/000000?text=ESP'">
        </div>
      </div>
    `;
  }

  // 4. VOICE PRONUNCIATION
  function speakAnnouncement(ticket) {
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel(); // Stop current speech
      const text = `Ticket ${ticket.id}. For Argentina, ${ticket.argentina.name}, Jersey number ${ticket.argentina.number}. Versus Spain, ${ticket.spain.name}, Jersey number ${ticket.spain.number}.`;
      const msg = new SpeechSynthesisUtterance(text);
      msg.rate = 0.9;
      window.speechSynthesis.speak(msg);
    }
  }

  // Handle Logic Based on Input
  function processCode() {
    const inputVal = document.getElementById('reveal-code').value.trim().toUpperCase();
    const audio = document.getElementById('stadium-cheer');
    
    // Play Background Sound
    audio.volume = 0.4;
    audio.play().catch(e => console.log("Audio needs user interaction first."));

    // 5. COMMAND LOGIC
    if (inputVal === 'ALL') {
      showAllTickets();
    } else if (inputVal === 'GOAT VS TIKI TAKA') {
      playSequence();
    } else {
      const num = parseInt(inputVal);
      if (!isNaN(num) && num >= 1 && num <= 23) {
        showOneTicket(num);
      } else {
        alert("Incorrect code! Please ask the creator for the code.");
        audio.pause();
      }
    }
  }

  // Show All Grid
  function showAllTickets() {
    document.getElementById('welcome-screen').style.display = 'none';
    const grid = document.getElementById('all-tickets-grid');
    grid.style.display = 'flex';
    
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(new SpeechSynthesisUtterance("All tickets revealed."));
    }

    ticketsData.forEach(t => {
      grid.innerHTML += `<div class="ticket-static">${createTicketHTML(t)}</div>`;
    });
  }

  // Show Single Ticket
  function showOneTicket(id) {
    document.getElementById('welcome-screen').style.display = 'none';
    const wrapper = document.getElementById('tickets-wrapper');
    wrapper.style.display = 'block';
    wrapper.innerHTML = ''; // Clear container
    
    const ticket = ticketsData.find(t => t.id === id);
    const div = document.createElement('div');
    div.className = 'ticket active';
    div.innerHTML = createTicketHTML(ticket);
    wrapper.appendChild(div);
    
    setTimeout(() => {
      div.querySelector('.players-reveal').classList.add('show');
      speakAnnouncement(ticket);
    }, 1000);
  }

  // Play Full Sequence
  function playSequence() {
    document.getElementById('welcome-screen').style.display = 'none';
    const wrapper = document.getElementById('tickets-wrapper');
    wrapper.style.display = 'block';
    
    // Pre-load all tickets hidden
    ticketsData.forEach(t => {
      const div = document.createElement('div');
      div.className = 'ticket';
      div.id = 'ticket-' + t.id;
      div.innerHTML = createTicketHTML(t);
      wrapper.appendChild(div);
    });

    let current = 1;
    function next() {
      if (current > ticketsData.length) return;
      
      const el = document.getElementById('ticket-' + current);
      const data = ticketsData.find(t => t.id === current);
      
      el.classList.add('active'); // Ticket zooms in
      
      setTimeout(() => {
        el.querySelector('.players-reveal').classList.add('show');
        speakAnnouncement(data); // Voice speaks
      }, 1500);
      
      setTimeout(() => {
        el.classList.remove('active');
        el.classList.add('diluted'); // Ticket zooms out
        current++;
        next();
      }, 10000); // 10 seconds per ticket to allow voice to finish
    }
    next();
  }

  window.onload = initLockedGrid;
</script>
</body>
</html>
