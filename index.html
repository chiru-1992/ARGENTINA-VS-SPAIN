<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FIFA 2026 Final</title>
<style>
  body { 
    margin: 0; 
    font-family: sans-serif; 
    background: linear-gradient(135deg, #87CEEB, #FF4500); 
    color: white; 
    text-align: center;
    min-height: 100vh;
  }
  
  #page-1 { padding: 50px; }
  .hero-img { width: 400px; height: 300px; border: 5px solid white; border-radius: 20px; }
  
  #page-2 { display: none; padding: 50px; }
  .controls { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px; display: inline-block; }
  
  .locked-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 30px; }
  .ticket-card { width: 120px; background: white; color: black; padding: 10px; border-radius: 10px; }
  
  .revealed-ticket { background: white; color: black; padding: 40px; border-radius: 20px; max-width: 600px; margin: 30px auto; }
  
  /* Firecracker animation class */
  .burst { animation: burst-anim 0.5s ease-out; }
  @keyframes burst-anim { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
</style>
</head>
<body>

<audio id="bg-music" src="music.mp3" autoplay loop></audio>
<audio id="firework-sound" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-16.mp3"></audio>

<div id="page-1">
  <h1>WELCOME TO FIFA WORLD CUP 2026</h1>
  <h2>ARGENTINA VS SPAIN</h2>
  <h3>Creator - CHIRANJEEVI GURUNG</h3>
  <div style="display:flex; justify-content:center; gap:20px;">
    <img src="WhatsApp-Image-2022-12-18-at-19.01.39.jpeg" class="hero-img">
    <img src="images.jpeg" class="hero-img">
  </div>
  <button onclick="document.getElementById('page-1').style.display='none'; document.getElementById('page-2').style.display='block';" style="padding:20px 40px; font-size:20px;">ENTER</button>
</div>

<div id="page-2">
  <div class="controls">
    <input type="text" id="code" placeholder="Secret Code">
    <input type="text" id="num" placeholder="Ticket Number or ALL">
    <button onclick="reveal()">REVEAL</button>
  </div>
  <div class="locked-grid" id="grid"></div>
  <div id="stage"></div>
</div>

<script>
  const ticketsData = [ /* Paste your ticketsData array here */ ];
  
  // Initialize grid
  const grid = document.getElementById('grid');
  ticketsData.forEach(t => {
    grid.innerHTML += `<div class="ticket-card">Ticket ${t.id}<br><b>${t.owners}</b></div>`;
  });

  function reveal() {
    const code = document.getElementById('code').value;
    const num = document.getElementById('num').value.toUpperCase();
    
    if(code !== "GOAT VS TIKI TAKA") return alert("Wrong Code!");
    
    document.getElementById('firework-sound').play();
    document.getElementById('grid').style.display = 'none';
    
    if(num === 'ALL') {
      ticketsData.forEach(t => showTicket(t, true));
    } else {
      const t = ticketsData.find(x => x.id == num);
      if(t) showTicket(t, false);
    }
  }

  function showTicket(t, isAll) {
    const stage = document.getElementById('stage');
    stage.innerHTML += `
      <div class="revealed-ticket burst">
        <h3>Ticket ${t.id} - ${t.owners}</h3>
        <div style="display:flex; justify-content:space-between">
          <div><h4>ARG</h4><img src="${t.argentina.photo}" width="100"><p>${t.argentina.name}</p></div>
          <div><h4>ESP</h4><img src="${t.spain.photo}" width="100"><p>${t.spain.name}</p></div>
        </div>
      </div>
    `;
    if(!isAll) {
        const msg = new SpeechSynthesisUtterance(`Ticket ${t.id}, owned by ${t.owners}. Argentina, ${t.argentina.name}. Spain, ${t.spain.name}.`);
        window.speechSynthesis.speak(msg);
    }
  }
</script>
</body>
</html>
