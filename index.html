<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FIFA 2026 Final</title>
    <style>
        body { margin: 0; font-family: 'Arial', sans-serif; text-align: center; }
        
        /* Page 1: Sky Blue and Red */
        #page-1 { background: linear-gradient(135deg, #87CEEB, #FF4500); padding: 50px 20px; color: black; font-weight: 900; min-height: 100vh; }
        #page-1 h1, h2, h3 { font-size: 2.5rem; text-transform: uppercase; }
        .hero-img { width: 350px; border: 5px solid white; border-radius: 15px; display: block; margin: 10px auto; }

        /* Page 2: Yellow and Blue */
        #page-2 { display: none; background: linear-gradient(135deg, #FFFF00, #0000FF); min-height: 100vh; padding: 20px; }
        
        /* Premium Parrot Green Tickets */
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding-top: 20px; }
        .card { 
            width: 180px; height: 240px; background: #7CFC00; border: 8px solid gold; 
            border-radius: 20px; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; position: relative; overflow: hidden; opacity: 0; transition: opacity 1s;
        }
        .watermark { 
            position: absolute; transform: rotate(-45deg); font-size: 1.5rem; 
            font-weight: 900; color: black; opacity: 0.3; pointer-events: none; 
        }
        
        .revealed { background: white; color: black; padding: 30px; border-radius: 20px; margin: 20px auto; max-width: 600px; border: 5px solid gold; }
    </style>
</head>
<body>
    <audio id="bg-music" src="music.mp3" loop autoplay></audio>
    
    <div id="page-1">
        <h1>WELCOME TO CHIRU'S WORLD OF GAME</h1>
        <h3>BUY TICKET FOR Rs 100 AND GET EXCITING PRIZE</h3>
        <p>1st prize- Rs 1200, 2nd Prize- 600 and 3rd prize- 200</p>
        <h2>FINAL OF FIFA WORLD CUP 2026</h2>
        <img src="WhatsApp-Image-2022-12-18-at-19.01.39_2.jpeg" class="hero-img">
        <h2 style="margin:0;">VS</h2>
        <img src="images_2.jpeg" class="hero-img">
        <button onclick="startApp()" style="padding:20px 40px; font-size:24px; cursor:pointer;">ENTER</button>
    </div>

    <div id="page-2">
        <input id="code" placeholder="Secret Code">
        <input id="num" placeholder="Ticket Number or ALL">
        <button onclick="reveal()">REVEAL</button>
        <div class="grid" id="grid"></div>
        <div id="stage"></div>
    </div>

    <script>
        const ticketsData = [
            { id: 1, owners: "NIRAJ and KARAN / SAJIT", argentina: { name: "Lionel MESSI", number: 10, photo: "images/argentina/messi.jpg" }, spain: { name: "GAVI", number: 9, photo: "images/spain/gavi.jpg" } },
            /* ADD YOUR REMAINING 22 TICKETS HERE FOLLOWING THE FORMAT ABOVE */
        ];
        
        function startApp() {
            document.getElementById('page-1').style.display = 'none';
            document.getElementById('page-2').style.display = 'block';
            document.getElementById('bg-music').play();
            
            const grid = document.getElementById('grid');
            ticketsData.forEach((t) => {
                grid.innerHTML += `
                    <div class="card" id="card-${t.id}">
                        <div class="watermark">CREATOR- CHIRU</div>
                        <div style="font-size:3rem">🔒</div>
                        Ticket ${t.id}<br><b>${t.owners}</b>
                    </div>`;
            });
            
            // Loop through each card and set a timeout increasing by 3 seconds each time
            ticketsData.forEach((t, i) => {
                setTimeout(() => {
                    const el = document.getElementById(`card-${t.id}`);
                    if(el) el.style.opacity = "1";
                }, i * 3000); // 3000ms = 3 seconds
            });
        }

        function reveal() {
            if(document.getElementById('code').value !== "GOAT VS TIKI TAKA") return alert("Wrong Code!");
            const num = document.getElementById('num').value.toUpperCase();
            document.getElementById('grid').style.display = 'none';
            
            if(num === 'ALL') ticketsData.forEach(t => show(t));
            else {
                const t = ticketsData.find(x => x.id == num);
                if(t) show(t);
            }
        }

        function show(t) {
            document.getElementById('stage').innerHTML += `
                <div class="revealed">
                    <h3>Ticket ${t.id} - ${t.owners}</h3>
                    <div style="display:flex; justify-content:space-around">
                        <div><img src="${t.argentina.photo}" width="100"><p>${t.argentina.name}</p></div>
                        <div><img src="${t.spain.photo}" width="100"><p>${t.spain.name}</p></div>
                    </div>
                </div>`;
        }
    </script>
</body>
</html>
